services:
  minecraft:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${CONTAINER_NAME:-minecraft-server}
    user: "${PUID:-1000}:${PGID:-1000}"
    restart: unless-stopped
    init: true
    stdin_open: true
    tty: true
    env_file:
      - .env
    volumes:
      - ${MINECRAFT_DATA_DIR:-.}:/minecraft
    ports:
      - "${MINECRAFT_PORT:-25565}:${MINECRAFT_CONTAINER_PORT:-25565}"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/${MINECRAFT_CONTAINER_PORT:-25565}' >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
